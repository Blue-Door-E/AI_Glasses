name: Jetson Smoke Test

on:
  push:
    branches:
      - main
    paths:
      - "Jetson Code/**"
      - ".github/workflows/jetson-smoke-test.yml"
  pull_request:
    paths:
      - "Jetson Code/**"
      - ".github/workflows/jetson-smoke-test.yml"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log runner OS info
        shell: bash
        run: |
          set -euo pipefail
          cat /etc/os-release
          uname -a

      - name: Free disk space
        shell: bash
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          df -h

      - name: Download and load docker image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URL="https://huggingface.co/BlueDoorE/edith-glasses_jp64.tar/resolve/main/edith-glasses_jp64.tar"
          TAR_PATH="$RUNNER_TEMP/edith-glasses_jp64.tar"

          echo "Downloading image tar from Hugging Face..."
          curl -fL --retry 3 --retry-delay 5 "$IMAGE_URL" -o "$TAR_PATH"
          docker load -i "$TAR_PATH"
          rm -f "$TAR_PATH"

      - name: Run smoke test in container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            edith-glasses:jp64 \
            -lc 'python3 "Jetson Code/Code/smoke_test.py"'
