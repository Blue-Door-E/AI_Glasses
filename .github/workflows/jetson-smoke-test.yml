name: Jetson Smoke Test

on:
  push:
    branches:
      - main
    paths:
      - "Jetson Code/**"
      - ".github/workflows/jetson-smoke-test.yml"
  pull_request:
    paths:
      - "Jetson Code/**"
      - ".github/workflows/jetson-smoke-test.yml"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log runner OS info
        shell: bash
        run: |
          set -euo pipefail
          cat /etc/os-release
          uname -a

      - name: Load docker image from local tar
        shell: bash
        run: |
          set -euo pipefail
          TAR_PATH="/home/erick/EDITH_CODE/AI_Glasses/Jetson Code/Docker/edith-glasses_jp64.tar"
          test -f "$TAR_PATH"
          docker load -i "$TAR_PATH"

      - name: Run smoke test in container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            edith-glasses:jp64 \
            -lc 'python3 "Jetson Code/Code/smoke_test.py"'
