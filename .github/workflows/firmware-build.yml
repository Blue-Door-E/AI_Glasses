name: Firmware Build Check

on:
  pull_request:
    paths:
      - "main/**"
      - "CMakeLists.txt"
      - "sdkconfig"
      - "sdkconfig.defaults"
      - ".github/workflows/firmware-build.yml"
  push:
    branches:
      - main
    paths:
      - "main/**"
      - "CMakeLists.txt"
      - "sdkconfig"
      - "sdkconfig.defaults"
      - ".github/workflows/firmware-build.yml"
  workflow_dispatch:

jobs:
  build-esp32s3:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF version
        run: idf.py --version

      - name: Build firmware (ESP32-S3)
        run: idf.py -DIDF_TARGET=esp32s3 build
